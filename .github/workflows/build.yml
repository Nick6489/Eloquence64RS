name: Build Eloquence64RS Add-on

on:
  push:
  pull_request:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up 64-bit Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          architecture: x64

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-pc-windows-msvc
          components: rustfmt, clippy

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Check locked dependencies
        run: uv lock --check

      - name: Lint Python
        run: runlint.bat
        shell: cmd

      - name: Check Rust formatting
        run: cargo fmt --manifest-path native_host/Cargo.toml --check

      - name: Test and lint Rust (x64)
        run: |
          cargo test --manifest-path native_host/Cargo.toml
          cargo clippy --manifest-path native_host/Cargo.toml --all-targets -- -D warnings
        shell: pwsh

      - name: Install MSYS2 / gettext
        uses: msys2/setup-msys2@v2
        with:
          install: gettext
          update: true

      - name: Add MSYS2 to PATH
        run: echo "C:\msys64\usr\bin" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Fetch proprietary files
        run: python fetch_eci.py

      - name: Test and lint Rust (i686 with Eloquence)
        run: |
          cargo test --manifest-path native_host/Cargo.toml --target i686-pc-windows-msvc
          cargo clippy --manifest-path native_host/Cargo.toml --target i686-pc-windows-msvc --all-targets -- -D warnings
        shell: pwsh
        env:
          ELOQUENCE_ECI_PATH: ${{ github.workspace }}\addon\synthDrivers\eloquence\ECI.DLL

      - name: Build 32-bit native host
        run: build_host.cmd
        shell: cmd

      - name: Test Python
        run: runpytest.bat
        shell: cmd
        env:
          ELOQUENCE_ECI_PATH: ${{ github.workspace }}\addon\synthDrivers\eloquence\ECI.DLL

      - name: Build addon
        run: scons.bat && scons.bat pot
        shell: cmd

      - name: Upload add-on artifact
        uses: actions/upload-artifact@v7
        with:
          name: eloquence64rs-nvda-addon
          path: "*.nvda-addon"
          archive: false
      
      - name: Upload pot artifact
        uses: actions/upload-artifact@v7
        with:
          name: pot-file
          path: "*.pot"
          archive: false

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.nvda-addon
            *.pot
